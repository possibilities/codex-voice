name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Compute build tag
        id: meta
        run: |
          SHA_SHORT="$(git rev-parse --short HEAD)"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "tag=build-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "zip=CodexVoice-${SHA_SHORT}-macos-arm64.zip" >> "$GITHUB_OUTPUT"

      - name: Skip if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.meta.outputs.tag }} already exists — nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Select Xcode
        if: steps.check.outputs.exists != 'true'
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        if: steps.check.outputs.exists != 'true'
        run: brew install xcodegen

      - name: Generate Xcode project
        if: steps.check.outputs.exists != 'true'
        run: xcodegen generate

      - name: Build (Release, arm64, ad-hoc signed)
        if: steps.check.outputs.exists != 'true'
        run: |
          xcodebuild \
            -project CodexVoice.xcodeproj \
            -scheme CodexVoice \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath build \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM= \
            build

      - name: Package .app
        if: steps.check.outputs.exists != 'true'
        run: |
          APP_PATH="build/Build/Products/Release/CodexVoice.app"
          test -d "${APP_PATH}" || { echo "App bundle missing at ${APP_PATH}"; exit 1; }
          ditto -c -k --keepParent "${APP_PATH}" "${{ steps.meta.outputs.zip }}"
          ls -lh "${{ steps.meta.outputs.zip }}"

      - name: Create release
        if: steps.check.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --title "Build ${{ steps.meta.outputs.sha_short }}" \
            --notes "Automated build of ${{ github.sha }} — macOS 14+, Apple Silicon (arm64), ad-hoc signed. Unzip, move to /Applications, and on first launch right-click → Open to bypass Gatekeeper." \
            "${{ steps.meta.outputs.zip }}"
