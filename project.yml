name: CodexVoice
options:
  bundleIdPrefix: dev.codexvoice
configs:
  Debug: debug
  Release: release
targets:
  CodexVoice:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: CodexVoice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.codexvoice.app
        PRODUCT_NAME: CodexVoice
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: CodexVoice/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: NO
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    scheme:
      testTargets: []
